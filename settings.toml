# settings.toml: Configuration for Firestore and Datastore documentation mirror

# Discovery entry points
seeds = [
    "https://docs.cloud.google.com/firestore/native/docs",
    "https://docs.cloud.google.com/firestore/docs/samples/firestore-data-set-id-random-collection-async",
    "https://docs.cloud.google.com/firestore/mongodb-compatibility/docs",
    "https://docs.cloud.google.com/datastore/docs/concepts/overview",
    "https://docs.cloud.google.com/datastore/docs/samples/datastore-add-entity",
    "https://docs.cloud.google.com/sdk/gcloud/reference/firestore",
    "https://docs.cloud.google.com/sdk/gcloud/reference/datastore",
    "https://cloud.google.com/products/firestore",
]

# Path prefixes to mirror
# Keep the documentation and product-site corpora distinct.
prefixes = [
    "docs.cloud.google.com/firestore/",
    "docs.cloud.google.com/datastore/",
    "docs.cloud.google.com/sdk/gcloud/reference/firestore/",
    "docs.cloud.google.com/sdk/gcloud/reference/alpha/firestore/",
    "docs.cloud.google.com/sdk/gcloud/reference/beta/firestore/",
    "docs.cloud.google.com/sdk/gcloud/reference/datastore/",
    "docs.cloud.google.com/sdk/gcloud/reference/alpha/datastore/",
    "docs.cloud.google.com/sdk/gcloud/reference/beta/datastore/",
    # Legacy documentation links are retained narrowly for redirect recovery.
    "cloud.google.com/firestore/native/docs/",
    "cloud.google.com/firestore/docs/",
    "cloud.google.com/firestore/mongodb-compatibility/docs/",
    "cloud.google.com/datastore/docs/",
    "cloud.google.com/sdk/gcloud/reference/firestore/",
    "cloud.google.com/sdk/gcloud/reference/alpha/firestore/",
    "cloud.google.com/sdk/gcloud/reference/beta/firestore/",
    "cloud.google.com/sdk/gcloud/reference/datastore/",
    "cloud.google.com/sdk/gcloud/reference/alpha/datastore/",
    "cloud.google.com/sdk/gcloud/reference/beta/datastore/",
]

# Sitemap URL(s) to discover links
# sitemaps = ["https://cloud.google.com/sitemap.xml"]

# Recursive discovery from Markdown content
recursive = true

# Rate limiting: requests per minute (default: 50.0)
# qpm = 50.0

# Wait duration when quota is exceeded (default: 1m10s)
# qw = "1m10s"
